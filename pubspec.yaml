name: just_firebase
description: "Firebase integration for the just ecosystem — Auth, Firestore, Analytics, and Remote Config with reactive signals, secure storage, and offline caching."
version: 0.1.0
homepage: https://github.com/just-unknown-dev/just-firebase
repository: https://github.com/just-unknown-dev/just-firebase
issue_tracker: https://github.com/just-unknown-dev/just-firebase/issues

environment:
  sdk: ^3.11.0
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_analytics: ^11.0.0
  firebase_remote_config: ^5.0.0
  google_sign_in: ^6.0.0

  # just ecosystem
  just_signals: ^1.0.1
  just_storage: ^1.2.0
  just_database: ^1.4.0
  just_memory: ^0.1.0

  # Utilities
  crypto: ^3.0.3
  meta: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.0
